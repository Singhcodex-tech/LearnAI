<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Slide Visual Renderer — Integration Demo</title>
<style>
/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0e0e16;color:#e8e8f4;min-height:100vh;padding:32px 16px}

/* ─── DEMO SHELL ─── */
.demo-wrap{max-width:780px;margin:0 auto}
.demo-header{text-align:center;margin-bottom:36px}
.demo-header h1{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.demo-header p{color:#7878a0;font-size:15px}
.tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:rgba(120,100,255,.15);color:#a090ff;border:1px solid rgba(120,100,255,.3);border-radius:20px;padding:3px 10px;margin-bottom:12px}

/* ─── SLIDE CARD ─── */
.slide-card{background:#14141f;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;margin-bottom:28px}
.slide-head{padding:20px 24px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.slide-head h2{font-size:18px;font-weight:600;letter-spacing:-.2px}
.slide-body{padding:20px 24px}
.slide-points{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.slide-points li{display:flex;gap:10px;font-size:14px;line-height:1.6;color:#c0c0dc}
.slide-points li::before{content:'';width:6px;height:6px;border-radius:50%;background:#6655cc;flex-shrink:0;margin-top:7px}

/* ─── VISUAL SECTION ─── */
.visual-section{border-top:1px solid rgba(255,255,255,.06);padding:20px 24px 24px}
.visual-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#5050780;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:#606080}
.visual-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.visual-box{background:#0e0e18;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden}
.visual-loading{display:flex;align-items:center;gap:10px;padding:28px 20px;color:#50508a;font-size:13px}
.spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(100,90,220,.2);border-top-color:#7b6aee;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.visual-error{padding:16px 20px;font-size:13px;color:#e07070;background:rgba(200,60,60,.07);border-radius:8px;margin:8px}

/* ─── SVG VISUALS ─── */
.visual-svg-wrap{padding:16px;overflow-x:auto}
.visual-svg-wrap svg{display:block;margin:0 auto;max-width:100%}

/* ─── BUTTONS ─── */
.btn-visual{display:inline-flex;align-items:center;gap:6px;background:rgba(120,100,255,.12);color:#a090ff;border:1px solid rgba(120,100,255,.25);border-radius:9px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s}
.btn-visual:hover{background:rgba(120,100,255,.22)}
</style>
</head>
<body>
<div class="demo-wrap">
  <div class="demo-header">
    <div class="tag">Integration Demo</div>
    <h1>Auto Visual After Bullet Points</h1>
    <p>This shows exactly how to call <code style="color:#a090ff">/visual</code> and render the result below each slide.</p>
  </div>
  <div id="slides-container"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIGURATION — point this at your Flask server
// ═══════════════════════════════════════════════════════════════
const API_BASE = 'http://localhost:5000';   // ← change in production

// ═══════════════════════════════════════════════════════════════
//  DEMO DATA  (replace with real session_id + slides from /generate)
// ═══════════════════════════════════════════════════════════════
const DEMO_SESSION_ID = 'demo-session';
const DEMO_SLIDES = [
  {
    title: 'The Water Cycle',
    points: [
      'Evaporation converts liquid water to vapour using solar energy at temperatures above 0 °C.',
      'Transpiration releases water vapour through plant stomata, contributing ~10 % of atmospheric moisture.',
      'Condensation occurs when vapour cools below the dew point, forming clouds or fog.',
      'Precipitation returns water to Earth as rain, snow, sleet, or hail depending on temperature.',
      'Runoff and infiltration channel water back to oceans or underground aquifers completing the loop.'
    ]
  },
  {
    title: 'Photosynthesis vs Cellular Respiration',
    points: [
      'Photosynthesis converts CO₂ + H₂O + light energy into glucose (C₆H₁₂O₆) and O₂ in chloroplasts.',
      'Cellular respiration breaks down glucose in mitochondria releasing ~36 ATP molecules per glucose.',
      'Photosynthesis is an endothermic anabolic process; respiration is exothermic and catabolic.',
      'Both processes share the ATP currency and use electron transport chains.',
      'Net equation of respiration: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP.'
    ]
  },
  {
    title: 'Stages of Mitosis',
    points: [
      'Prophase: chromatin condenses into visible chromosomes; mitotic spindle begins forming.',
      'Metaphase: chromosomes align at the cell equator (metaphase plate) attached to spindle fibres.',
      'Anaphase: sister chromatids are pulled to opposite poles by shortening spindle microtubules.',
      'Telophase: nuclear envelopes reform around each chromosome set; chromosomes decondense.',
      'Cytokinesis: cytoplasm divides producing two genetically identical daughter cells.'
    ]
  }
];

// ═══════════════════════════════════════════════════════════════
//  RENDER ALL SLIDES
// ═══════════════════════════════════════════════════════════════
function renderSlides() {
  const container = document.getElementById('slides-container');
  DEMO_SLIDES.forEach((slide, idx) => {
    const card = document.createElement('div');
    card.className = 'slide-card';
    card.id = `slide-${idx}`;
    card.innerHTML = `
      <div class="slide-head"><h2>${escHtml(slide.title)}</h2></div>
      <div class="slide-body">
        <ul class="slide-points">
          ${slide.points.map(p => `<li>${escHtml(p)}</li>`).join('')}
        </ul>
        <button class="btn-visual" onclick="loadVisual(${idx})">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
          Generate Visual
        </button>
      </div>
      <div class="visual-section" id="visual-${idx}" style="display:none">
        <div class="visual-label">AI-Generated Visual</div>
        <div class="visual-box" id="visual-box-${idx}"></div>
      </div>`;
    container.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════════
//  CALL /visual AND RENDER
// ═══════════════════════════════════════════════════════════════
async function loadVisual(slideIndex) {
  const section = document.getElementById(`visual-${slideIndex}`);
  const box     = document.getElementById(`visual-box-${slideIndex}`);
  section.style.display = 'block';
  box.innerHTML = `<div class="visual-loading"><div class="spinner"></div>Generating visual…</div>`;

  try {
    const res = await fetch(`${API_BASE}/visual`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: DEMO_SESSION_ID, slide_index: slideIndex })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Server error ${res.status}`);
    }

    const json = await res.json();
    const visual = json.visual;

    // ── For this demo we generate the visual CLIENT-SIDE from mock data ──
    // In production remove the mock below and just call renderVisual(visual, box)
    renderVisual(visual, box);

  } catch (e) {
    // DEMO FALLBACK: generate mock visual so you can see the renderer working
    // without a live server. Remove in production.
    console.warn('Server unreachable, using mock data for demo:', e.message);
    const mock = MOCK_VISUALS[slideIndex];
    if (mock) renderVisual(mock, box);
    else box.innerHTML = `<div class="visual-error">⚠ ${escHtml(e.message)}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════════
//  MOCK DATA (demo only — delete when using real API)
// ═══════════════════════════════════════════════════════════════
const MOCK_VISUALS = [
  {
    type: 'cycle',
    title: 'The Water Cycle',
    data: {
      steps: [
        { label: 'Evaporation',   sub: 'Solar energy vaporises water' },
        { label: 'Transpiration', sub: 'Plants release water vapour' },
        { label: 'Condensation',  sub: 'Vapour cools into clouds' },
        { label: 'Precipitation', sub: 'Rain, snow falls to Earth' },
        { label: 'Runoff',        sub: 'Water returns to oceans' }
      ]
    }
  },
  {
    type: 'comparison',
    title: 'Photosynthesis vs Respiration',
    data: {
      headers: ['Photosynthesis', 'Respiration'],
      items: [
        { label: 'Location',   a: 'Chloroplasts',     b: 'Mitochondria' },
        { label: 'Reactants',  a: 'CO₂ + H₂O + light', b: 'Glucose + O₂' },
        { label: 'Products',   a: 'Glucose + O₂',     b: 'CO₂ + H₂O + ATP' },
        { label: 'Energy',     a: 'Stored (anabolic)', b: 'Released (catabolic)' },
        { label: 'Direction',  a: 'Endothermic',       b: 'Exothermic' }
      ]
    }
  },
  {
    type: 'flowchart',
    title: 'Stages of Mitosis',
    data: {
      nodes: [
        { id:'n1', label:'Cell enters mitosis', sub:'DNA already replicated',  type:'start'    },
        { id:'n2', label:'Prophase',            sub:'Chromosomes condense',     type:'step'     },
        { id:'n3', label:'Metaphase',           sub:'Align at equator',         type:'step'     },
        { id:'n4', label:'Anaphase',            sub:'Chromatids pulled apart',  type:'step'     },
        { id:'n5', label:'Telophase',           sub:'Nuclei reform',            type:'step'     },
        { id:'n6', label:'Two daughter cells',  sub:'Genetically identical',    type:'end'      }
      ],
      edges: [
        { from:'n1', to:'n2', label:'' },
        { from:'n2', to:'n3', label:'' },
        { from:'n3', to:'n4', label:'' },
        { from:'n4', to:'n5', label:'' },
        { from:'n5', to:'n6', label:'' }
      ]
    }
  }
];

// ═══════════════════════════════════════════════════════════════
//  VISUAL DISPATCH
// ═══════════════════════════════════════════════════════════════
function renderVisual(visual, box) {
  const wrap = document.createElement('div');
  wrap.className = 'visual-svg-wrap';
  let svg = '';
  try {
    switch (visual.type) {
      case 'flowchart':   svg = drawFlowchart(visual);  break;
      case 'cycle':       svg = drawCycle(visual);      break;
      case 'comparison':  svg = drawComparison(visual); break;
      case 'timeline':    svg = drawTimeline(visual);   break;
      case 'pyramid':     svg = drawPyramid(visual);    break;
      case 'mindmap':     svg = drawMindmap(visual);    break;
      default:            throw new Error('Unknown visual type: ' + visual.type);
    }
  } catch(e) {
    box.innerHTML = `<div class="visual-error">⚠ Render error: ${escHtml(e.message)}</div>`;
    return;
  }
  wrap.innerHTML = svg;
  box.innerHTML = '';
  box.appendChild(wrap);
}

// ═══════════════════════════════════════════════════════════════
//  SHARED SVG HELPERS
// ═══════════════════════════════════════════════════════════════
const DEFS = `<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4a4a7a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>`;

function svgWrap(w, h, body) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${DEFS}${body}</svg>`;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// Title bar at top of every visual
function titleBar(w, title, typeLabel) {
  const colors = {flowchart:'#7b61ff',cycle:'#00c9a7',comparison:'#ff7c7c',timeline:'#f4a62a',pyramid:'#a78bfa',mindmap:'#34d399'};
  const c = colors[typeLabel] || '#7b61ff';
  return `<rect x="0" y="0" width="${w}" height="38" fill="${c}18" rx="0"/>
    <text x="14" y="24" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="${c}">${esc(title)}</text>
    <text x="${w-14}" y="24" font-family="Segoe UI,sans-serif" font-size="11" fill="${c}99" text-anchor="end">${typeLabel.toUpperCase()}</text>`;
}

// ═══════════════════════════════════════════════════════════════
//  FLOWCHART
// ═══════════════════════════════════════════════════════════════
function drawFlowchart(v) {
  const { nodes, edges } = v.data;
  const NW = 200, NH = 54, GAPX = 60, GAPY = 80, PAD = 40;
  const W = 680;

  // topological levels
  const out = {}, levels = {};
  nodes.forEach(n => out[n.id] = []);
  edges.forEach(e => out[e.from] && out[e.from].push(e.to));
  const start = nodes.find(n => n.type === 'start') || nodes[0];

  function setL(id, l) {
    if ((levels[id]??-1) >= l) return;
    levels[id] = l;
    (out[id]||[]).forEach(t => setL(t, l+1));
  }
  setL(start.id, 0);
  nodes.forEach(n => { if (levels[n.id]==null) levels[n.id]=0; });

  const byL = {};
  nodes.forEach(n => { const l=levels[n.id]||0; (byL[l]=byL[l]||[]).push(n); });
  const maxL = Math.max(...Object.keys(byL).map(Number));

  const pos = {};
  Object.entries(byL).forEach(([l,grp]) => {
    grp.forEach((n,i) => {
      const total = grp.length * NW + (grp.length-1)*20;
      const sx = (W - total)/2;
      pos[n.id] = { x: sx + i*(NW+20) + NW/2, y: PAD + 38 + l*(NH+GAPY) };
    });
  });

  const H = PAD + 38 + (maxL+1)*(NH+GAPY) + PAD;
  const COL = { start:'#00c9a7', end:'#ff7c7c', decision:'#7b61ff', step:'#3a3a5c' };
  const STROKE = { start:'#00c9a7', end:'#ff7c7c', decision:'#7b61ff', step:'#5050a0' };
  const TEXT = { start:'#00c9a7', end:'#ff7c7c', decision:'#c4b8ff', step:'#c0c0e0' };

  let body = titleBar(W, v.title, 'flowchart');

  edges.forEach(e => {
    const fp=pos[e.from], tp=pos[e.to];
    if (!fp||!tp) return;
    const x1=fp.x, y1=fp.y+NH/2, x2=tp.x, y2=tp.y-NH/2-4;
    const mid=(y1+y2)/2;
    const d = Math.abs(x1-x2)<4 ? `M${x1},${y1}L${x2},${y2}`
                                  : `M${x1},${y1}C${x1},${mid} ${x2},${mid} ${x2},${y2}`;
    body += `<path d="${d}" fill="none" stroke="#3a3a6a" stroke-width="1.5" marker-end="url(#arr)"/>`;
  });

  nodes.forEach(n => {
    const p=pos[n.id]; if(!p) return;
    const x=p.x-NW/2, y=p.y-NH/2;
    const t=n.type||'step', rx = (t==='start'||t==='end') ? 27 : 8;
    const hasS = n.sub && n.sub.trim();
    body += `<rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="${rx}" fill="${COL[t]||COL.step}22" stroke="${STROKE[t]||STROKE.step}" stroke-width="1.2"/>`;
    body += `<text x="${p.x}" y="${p.y+(hasS?-8:1)}" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="${TEXT[t]||TEXT.step}" text-anchor="middle" dominant-baseline="central">${esc(n.label)}</text>`;
    if(hasS) body += `<text x="${p.x}" y="${p.y+11}" font-family="Segoe UI,sans-serif" font-size="11" fill="#50508a" text-anchor="middle" dominant-baseline="central">${esc(n.sub)}</text>`;
  });

  return svgWrap(W, H, body);
}

// ═══════════════════════════════════════════════════════════════
//  CYCLE
// ═══════════════════════════════════════════════════════════════
function drawCycle(v) {
  const steps = v.data.steps || [];
  const W=680, H=460, CX=340, CY=258, R=155;
  const n=steps.length, BOX_W=150, BOX_H=52;

  let body = titleBar(W, v.title, 'cycle');

  // Draw circular arrows between nodes
  steps.forEach((_,i) => {
    const a1 = -Math.PI/2 + (i/n)*2*Math.PI + 0.18;
    const a2 = -Math.PI/2 + ((i+1)/n)*2*Math.PI - 0.18;
    const x1 = CX + R*Math.cos(a1), y1 = CY + R*Math.sin(a1);
    const x2 = CX + R*Math.cos(a2), y2 = CY + R*Math.sin(a2);
    const large = (a2-a1) > Math.PI ? 1 : 0;
    body += `<path d="M${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2}" fill="none" stroke="#3a3a6a" stroke-width="1.5" marker-end="url(#arr)"/>`;
  });

  // Cycle center label
  body += `<circle cx="${CX}" cy="${CY}" r="48" fill="#14142a" stroke="#3a3a60" stroke-width="1"/>
    <text x="${CX}" y="${CY}" font-family="Segoe UI,sans-serif" font-size="12" fill="#6060a0" text-anchor="middle" dominant-baseline="central">CYCLE</text>`;

  // Step boxes
  const PALETTE = ['#7b61ff','#00c9a7','#f4a62a','#ff7c7c','#a78bfa','#34d399','#60a5fa'];
  steps.forEach((s,i) => {
    const angle = -Math.PI/2 + (i/n)*2*Math.PI;
    const bx = CX + (R+56)*Math.cos(angle) - BOX_W/2;
    const by = CY + (R+56)*Math.sin(angle) - BOX_H/2;
    const c = PALETTE[i % PALETTE.length];
    const hasS = s.sub && s.sub.trim();
    body += `<rect x="${bx}" y="${by}" width="${BOX_W}" height="${BOX_H}" rx="8" fill="${c}20" stroke="${c}" stroke-width="1.2"/>`;
    body += `<text x="${bx+BOX_W/2}" y="${by+(hasS?BOX_H/2-8:BOX_H/2)}" font-family="Segoe UI,sans-serif" font-size="12" font-weight="600" fill="${c}" text-anchor="middle" dominant-baseline="central">${esc(s.label)}</text>`;
    if(hasS) body += `<text x="${bx+BOX_W/2}" y="${by+BOX_H/2+9}" font-family="Segoe UI,sans-serif" font-size="10" fill="#50508a" text-anchor="middle" dominant-baseline="central">${esc(s.sub)}</text>`;
  });

  return svgWrap(W, H, body);
}

// ═══════════════════════════════════════════════════════════════
//  COMPARISON TABLE
// ═══════════════════════════════════════════════════════════════
function drawComparison(v) {
  const { headers=[], items=[] } = v.data;
  const W=680, ROW_H=44, HDR_H=52, TOP=38;
  const H = TOP + HDR_H + items.length*ROW_H + 20;
  const C1=34, C2=220, C3=450, CW=200;

  let body = titleBar(W, v.title, 'comparison');
  // header row
  body += `<rect x="${C1}" y="${TOP}" width="${C2-C1-4}" height="${HDR_H}" rx="8" fill="#1e1e32"/>
    <rect x="${C2}" y="${TOP}" width="${CW}" height="${HDR_H}" rx="8" fill="#7b61ff22" stroke="#7b61ff" stroke-width="1"/>
    <rect x="${C3}" y="${TOP}" width="${CW}" height="${HDR_H}" rx="8" fill="#00c9a722" stroke="#00c9a7" stroke-width="1"/>`;
  body += `<text x="${(C1+C2-4)/2}" y="${TOP+HDR_H/2}" font-family="Segoe UI,sans-serif" font-size="12" fill="#50508a" text-anchor="middle" dominant-baseline="central">Criterion</text>`;
  body += `<text x="${C2+CW/2}" y="${TOP+HDR_H/2}" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#a090ff" text-anchor="middle" dominant-baseline="central">${esc(headers[0]||'A')}</text>`;
  body += `<text x="${C3+CW/2}" y="${TOP+HDR_H/2}" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#00c9a7" text-anchor="middle" dominant-baseline="central">${esc(headers[1]||'B')}</text>`;

  items.forEach((item,i) => {
    const y = TOP + HDR_H + i*ROW_H;
    const bg = i%2===0 ? '#13131e' : '#15152a';
    body += `<rect x="${C1}" y="${y}" width="${W-C1*2}" height="${ROW_H}" fill="${bg}"/>`;
    body += `<text x="${(C1+C2-4)/2}" y="${y+ROW_H/2}" font-family="Segoe UI,sans-serif" font-size="12" font-weight="600" fill="#8080b0" text-anchor="middle" dominant-baseline="central">${esc(item.label)}</text>`;
    body += `<text x="${C2+CW/2}" y="${y+ROW_H/2}" font-family="Segoe UI,sans-serif" font-size="12" fill="#c0b8ff" text-anchor="middle" dominant-baseline="central">${esc(item.a)}</text>`;
    body += `<text x="${C3+CW/2}" y="${y+ROW_H/2}" font-family="Segoe UI,sans-serif" font-size="12" fill="#80e8d8" text-anchor="middle" dominant-baseline="central">${esc(item.b)}</text>`;
    // divider
    body += `<line x1="${C1}" y1="${y+ROW_H}" x2="${W-C1}" y2="${y+ROW_H}" stroke="#1e1e30" stroke-width="1"/>`;
  });

  return svgWrap(W, H, body);
}

// ═══════════════════════════════════════════════════════════════
//  TIMELINE
// ═══════════════════════════════════════════════════════════════
function drawTimeline(v) {
  const events = v.data.events || [];
  const W=680, PAD=48, EVENT_GAP=110, TOP=38;
  const H = TOP + PAD + events.length * EVENT_GAP + 40;
  const LX=90, TX=140;

  let body = titleBar(W, v.title, 'timeline');
  // vertical line
  body += `<line x1="${LX}" y1="${TOP+30}" x2="${LX}" y2="${H-20}" stroke="#2a2a4a" stroke-width="2"/>`;

  const COLORS=['#7b61ff','#00c9a7','#f4a62a','#ff7c7c','#a78bfa','#34d399','#60a5fa'];
  events.forEach((ev,i) => {
    const y = TOP + PAD + i*EVENT_GAP;
    const c = COLORS[i % COLORS.length];
    const hasS = ev.sub && ev.sub.trim();
    body += `<circle cx="${LX}" cy="${y}" r="8" fill="${c}" stroke="#0e0e18" stroke-width="2"/>`;
    body += `<text x="${LX-16}" y="${y}" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" fill="${c}" text-anchor="end" dominant-baseline="central">${esc(ev.year)}</text>`;
    body += `<rect x="${TX}" y="${y-22}" width="${W-TX-24}" height="${hasS?46:36}" rx="7" fill="${c}18" stroke="${c}44" stroke-width="1"/>`;
    body += `<text x="${TX+12}" y="${y+(hasS?-6:3)}" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="${c}" dominant-baseline="central">${esc(ev.label)}</text>`;
    if(hasS) body += `<text x="${TX+12}" y="${y+14}" font-family="Segoe UI,sans-serif" font-size="11" fill="#606080" dominant-baseline="central">${esc(ev.sub)}</text>`;
  });

  return svgWrap(W, H, body);
}

// ═══════════════════════════════════════════════════════════════
//  PYRAMID
// ═══════════════════════════════════════════════════════════════
function drawPyramid(v) {
  const levels = v.data.levels || [];
  const W=680, TOP=38, LH=48, GAP=6, PAD=30;
  const H = TOP + PAD + levels.length*(LH+GAP) + PAD;
  const COLORS=['#7b61ff','#a78bfa','#c4b5fd','#e9d5ff','#ede9fe','#f5f3ff'];

  let body = titleBar(W, v.title, 'pyramid');

  levels.forEach((lv, i) => {
    const wp = lv.width_pct || (30 + i*(60/Math.max(levels.length-1,1)));
    const bw = (W-PAD*2) * wp / 100;
    const bx = (W - bw)/2;
    const by = TOP + PAD + i*(LH+GAP);
    const c = COLORS[i % COLORS.length];
    const hasS = lv.sub && lv.sub.trim();
    body += `<rect x="${bx}" y="${by}" width="${bw}" height="${LH}" rx="5" fill="${c}28" stroke="${c}88" stroke-width="1.2"/>`;
    body += `<text x="${W/2}" y="${by+(hasS?LH/2-8:LH/2)}" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="${c}" text-anchor="middle" dominant-baseline="central">${esc(lv.label)}</text>`;
    if(hasS) body += `<text x="${W/2}" y="${by+LH/2+9}" font-family="Segoe UI,sans-serif" font-size="11" fill="#60608a" text-anchor="middle" dominant-baseline="central">${esc(lv.sub)}</text>`;
  });

  return svgWrap(W, H, body);
}

// ═══════════════════════════════════════════════════════════════
//  MINDMAP
// ═══════════════════════════════════════════════════════════════
function drawMindmap(v) {
  const { center='', branches=[] } = v.data;
  const W=680, CX=340, CY=220;
  const R_BRANCH=145, R_ITEM=230;
  const H=460;
  const COLORS=['#7b61ff','#00c9a7','#f4a62a','#ff7c7c','#a78bfa','#34d399'];

  let body = titleBar(W, v.title, 'mindmap');

  // center circle
  body += `<circle cx="${CX}" cy="${CY}" r="52" fill="#1a1a2e" stroke="#4040a0" stroke-width="1.5"/>`;
  const words = center.split(' ');
  const lines = [];
  let cur='';
  words.forEach(w=>{ if((cur+' '+w).trim().length>12 && cur){lines.push(cur);cur=w;}else{cur=(cur?cur+' ':'')+w;} });
  if(cur) lines.push(cur);
  lines.forEach((ln,li)=>{
    const ly = CY + (li - (lines.length-1)/2)*16;
    body += `<text x="${CX}" y="${ly}" font-family="Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#a0a0e0" text-anchor="middle" dominant-baseline="central">${esc(ln)}</text>`;
  });

  branches.forEach((br,i) => {
    const angle = (i/branches.length)*2*Math.PI - Math.PI/2;
    const c = COLORS[i % COLORS.length];
    const bx = CX + R_BRANCH*Math.cos(angle), by = CY + R_BRANCH*Math.sin(angle);

    // line from center to branch
    const ex=CX+52*Math.cos(angle), ey=CY+52*Math.sin(angle);
    body += `<line x1="${ex}" y1="${ey}" x2="${bx}" y2="${by}" stroke="${c}88" stroke-width="1.5"/>`;

    // branch label box
    const BW=120,BH=32;
    const bboxX=bx-BW/2, bboxY=by-BH/2;
    body += `<rect x="${bboxX}" y="${bboxY}" width="${BW}" height="${BH}" rx="16" fill="${c}22" stroke="${c}" stroke-width="1"/>`;
    body += `<text x="${bx}" y="${by}" font-family="Segoe UI,sans-serif" font-size="12" font-weight="600" fill="${c}" text-anchor="middle" dominant-baseline="central">${esc(br.label)}</text>`;

    // sub-items
    const items = br.items || [];
    items.forEach((item, j) => {
      const spread = (items.length-1)*0.28;
      const ia = angle - spread/2 + j*(items.length>1 ? spread/(items.length-1) : 0);
      const ix = CX + R_ITEM*Math.cos(ia), iy = CY + R_ITEM*Math.sin(ia);
      body += `<line x1="${bx}" y1="${by}" x2="${ix}" y2="${iy}" stroke="${c}44" stroke-width="1" stroke-dasharray="4 3"/>`;
      body += `<circle cx="${ix}" cy="${iy}" r="4" fill="${c}88"/>`;
      const ta = Math.cos(ia) > 0 ? 'start' : 'end';
      const tx = ix + (Math.cos(ia)>0?8:-8);
      body += `<text x="${tx}" y="${iy}" font-family="Segoe UI,sans-serif" font-size="11" fill="#8080b0" text-anchor="${ta}" dominant-baseline="central">${esc(item)}</text>`;
    });
  });

  return svgWrap(W, H, body);
}

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderSlides();
